# DefenseClaw Permissive Policy
# Development mode — scans and warns, blocks only CRITICAL
name: permissive
description: Permissive policy for development and testing

admission:
  scan_on_install: true
  allow_list_bypass_scan: true

skill_actions:
  critical:
    file: quarantine
    runtime: disable
    install: block
  high:
    file: none
    runtime: enable
    install: none
  medium:
    file: none
    runtime: enable
    install: none
  low:
    file: none
    runtime: enable
    install: none
  info:
    file: none
    runtime: enable
    install: none

enforcement:
  update_sandbox_policy: false
  max_enforcement_delay_seconds: 5

audit:
  log_all_actions: true
  log_scan_results: true
  retention_days: 30
