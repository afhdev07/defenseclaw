version: 2
project_name: defenseclaw

builds:
  - main: ./cmd/defenseclaw
    binary: defenseclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - repository:
      owner: defenseclaw
      name: homebrew-tap
    homepage: https://github.com/defenseclaw/defenseclaw
    description: Enterprise governance layer for OpenClaw
    install: |
      bin.install "defenseclaw"
